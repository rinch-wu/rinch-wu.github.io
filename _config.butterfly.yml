# --------------------------------------
# Hexo Butterfly Theme Configuration
# Chinese: https://butterfly.js.org/
# English: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-heart

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: pale night
  macStyle: true
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:
  fab fa-github: https://github.com/rinch-wu || Github || '#24292e'

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: https://butterfly.js.org/img/favicon.png

avatar:
  img: https://butterfly.js.org/img/butterfly-icon.png
  effect: false

disable_top_img: false

# 顶部默认背景图
default_top_img: https://raw.githubusercontent.com/jerryc127/CDN/master/img/top_img/default.jpg

# 首页顶部图
index_img: https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80

# 归档页顶部图
archive_img:

tag_img:

tag_per_img:

category_img:

category_per_img:

footer_img: false

# 网站背景 - 使用渐变色
background:

# 文章默认封面图
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=800&q=80
    - https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=80
    - https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800&q=80
    - https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80
    - https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=800&q=80
    - https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=800&q=80

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: 'Page Not Found'
  background: https://butterfly.js.org/img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------

index_site_info_top:
index_top_img_height:

# 首页打字机副标题
subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
    - '记录学习，分享技术'
    - '记录生活，留住感动'
    - 'Stay hungry, stay foolish'

index_layout: 3

index_post_content:
  method: 3
  length: 500

# --------------------------------------
# Post Settings
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false

# --------------------------------------
# Footer Settings
# --------------------------------------

footer:
  nav:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# Aside Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: '记录学习，分享技术 ✨'
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/rinch-wu
  card_announcement:
    enable: false
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_newest_comments:
    enable: false
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# --------------------------------------
# Bottom right button
# --------------------------------------

translate:
  enable: false

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: 2
  start: 18
  end: 6

rightside_item_order:
  enable: false

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------

anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 150

wordcount:
  enable: false
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Math
math:
  use:
  per_page: true

# Search
search:
  use: local_search
  placeholder: '搜索文章...'

  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    path: search.xml
    field: post
    pagination:
      enable: false

# Share
share:
  use:
comments:
  use:
  lazyload: false
  count: false
  card_post_count: false

# --------------------------------------
# Other Settings
# --------------------------------------

inject:
  head:
  bottom:

cdn:
  use:
  custom_url:

lightbox: true

random_cover: true

highlight_theme: pale night

highlight_shrink: false
